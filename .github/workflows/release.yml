name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allow manual trigger

jobs:
  release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Get version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=$(git describe --tags --dirty --always)
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
        
    - name: Build binaries
      run: |
        make build-all
        
    - name: Package binaries
      run: |
        make package
        
    - name: Generate changelog
      id: changelog
      run: |
        # Get the latest two tags
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
        CURRENT_TAG=${{ steps.version.outputs.VERSION }}
        
        echo "## Changes since ${PREVIOUS_TAG:-initial release}" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        
        if [ -n "$PREVIOUS_TAG" ]; then
          git log --pretty=format:"- %s" ${PREVIOUS_TAG}..HEAD >> CHANGELOG.md
        else
          echo "- Initial release" >> CHANGELOG.md
        fi
        
        echo "" >> CHANGELOG.md
        echo "## Binaries" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "Download the appropriate binary for your system:" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "- **Linux (x64)**: \`ipcrawler-linux-amd64.tar.gz\`" >> CHANGELOG.md
        echo "- **Linux (ARM64)**: \`ipcrawler-linux-arm64.tar.gz\`" >> CHANGELOG.md
        echo "- **macOS (Intel)**: \`ipcrawler-darwin-amd64.tar.gz\`" >> CHANGELOG.md
        echo "- **macOS (Apple Silicon)**: \`ipcrawler-darwin-arm64.tar.gz\`" >> CHANGELOG.md
        echo "- **Windows (x64)**: \`ipcrawler-windows-amd64.exe.tar.gz\`" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "Extract and run: \`tar -xzf <filename> && ./ipcrawler-<platform>\`" >> CHANGELOG.md
        
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: IPCrawler ${{ steps.version.outputs.VERSION }}
        body_path: CHANGELOG.md
        files: |
          dist/*.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 